<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TileMon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--tlm-bg:#14120D;--tlm-ink:#ECE7DA;--tlm-dim:#9A9182;--tlm-line:#2A2820;--tlm-gold:#E8C56A;--tlm-panel:#1C1A14}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--tlm-bg);color:var(--tlm-ink);
    font-family:"Space Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  /* full-page app: the whole window is the board (which draws its own toolbar/status as the frame's header/footer) */
  #board{position:fixed;inset:0}
  #empty{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--tlm-dim);
    font-family:"Space Mono",monospace;font-size:13px;line-height:1.7}
</style>
</head>
<body>
<div id="board"></div>

<script type="module">
// dashboard.html — the multi-board FILE source adapter. It owns "where the data lives":
// reads /api/state?board=<slug>, writes board-scoped requests, live-refreshes over SSE, and
// routes between boards by URL. All chrome (toolbar/status/switcher) is drawn by the renderer
// as the frame tile's own header/footer — this file is just the data seam. See SPEC §3.
import { mount } from './board.js';

const boardEl = document.getElementById('board');
let slug = null, board = null;

const slugFromUrl = () => {
  const m = location.pathname.match(/^\/boards\/([A-Za-z0-9_-]+)/);
  return m ? m[1] : new URLSearchParams(location.search).get('board');
};
async function listBoards() { const r = await fetch('/api/boards'); return r.ok ? r.json() : []; }
async function getState(s) {
  const r = await fetch('/api/state?board=' + encodeURIComponent(s));
  if (!r.ok) throw new Error('GET /api/state?board=' + s + ' -> ' + r.status);
  return r.json();
}
async function send(method, path, body) {
  try {
    const r = await fetch(path, { method, headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) { console.error(method, path, '->', r.status, await r.text()); return null; }
    return await r.json().catch(() => ({}));
  } catch (e) { console.error(method, path, 'failed', e); return null; }
}

// writes carry the OWNING board of the node (stamped by the server) — so edits land on the
// right board even when a nested board is inlined into the one you're viewing.
const onStatusChange = (b, path, status) => send('POST', '/api/status', { board: b, path, status });
const onWeightChange = (b, path, weight) => send('POST', '/api/weight', { board: b, path, weight });
const onAddNode = (b, path, kind, name) => send('POST', '/api/node', { board: b, path, kind, name });
// "add a nested board" = create a bare board, then include it here (two clean primitives).
const onAddBoard = async (b, path, name) => {
  const made = await send('POST', '/api/board', { name });
  if (made && made.slug) await send('POST', '/api/node', { board: b, path, kind: 'include', target: made.slug });
};
const onMoveNode = (b, path, toBoard, toPath) => send('POST', '/api/move', { board: b, path, toBoard, toPath });
const onRenameNode = (b, path, name) => send('PATCH', '/api/node', { board: b, path, name });
const onDeleteNode = (b, path) => send('DELETE', '/api/node', { board: b, path });
const onSetToolbar = (b, path, toolbar) => send('PATCH', '/api/node', { board: b, path, toolbar });
const openBoard = s => { history.pushState({ slug: s }, '', '/boards/' + s); load(s); };
// done-cooldown is a viewer preference — persist it here (localStorage), not on the board.
const DONE_KEY = 'tlm-done-cooldown';
const readDoneCooldown = () => { const r = localStorage.getItem(DONE_KEY); return r == null ? undefined : (r === 'Infinity' ? Infinity : Number(r)); };
const onDoneCooldownChange = ms => localStorage.setItem(DONE_KEY, ms === Infinity ? 'Infinity' : String(ms));
const cbs = { onStatusChange, onWeightChange, onAddNode, onAddBoard, onMoveNode, onRenameNode, onDeleteNode, onSetToolbar, onOpenBoard: openBoard, onDoneCooldownChange };

async function load(s) {
  slug = s;
  const list = await listBoards();
  try {
    const state = await getState(s);
    document.getElementById('empty')?.remove();
    boardEl.style.display = '';
    if (!board) board = mount(boardEl, null, { state, boards: list, doneCooldown: readDoneCooldown(), ...cbs });
    else { board.update(state); board.setBoards(list); }
  } catch (e) {
    console.error(e);
    boardEl.style.display = 'none';
    if (!document.getElementById('empty')) boardEl.insertAdjacentHTML('afterend', `<div id="empty">board “${s}” not found</div>`);
  }
}

// starting board: URL slug wins; else the `tilemon` home/master board once it's populated; else
// the tutorial; else the (empty) home; else any real board. The home board is the root you land
// on when set up; the tutorial only takes over on a fresh install and stays in the switcher.
const pick = bs => {
  const get = s => bs.find(b => b.slug === s);
  const home = get('home'), tut = get('tutorial');
  const b = (home && home.items > 0 && home)          // your home board, once it has content
         || tut                                        // else the tutorial (fresh install)
         || home                                       // else the (still-empty) home board
         || bs.find(b => b.slug !== 'tutorial' && b.source === 'native')
         || bs[0] || {};
  return b.slug;
};
const boards = await listBoards();
const start = slugFromUrl() || pick(boards);
if (start) load(start);
else { boardEl.style.display = 'none'; boardEl.insertAdjacentHTML('afterend', `<div id="empty">No boards yet.<br>Run an agent (node examples/agent.mjs) to populate one.</div>`); }

window.onpopstate = () => { const s = slugFromUrl() || pick(boards); if (s) load(s); };

// Live refresh over SSE: any write (ours, another tab, an agent, a direct file edit) pushes a
// change; we re-fetch the current board. board.js preserves drill/selection, ignores mid-drag.
const es = new EventSource('/api/events');
es.onmessage = async () => { if (!slug) { const s = pick(await listBoards()); if (s) load(s); return; } try { board && board.update(await getState(slug)); } catch (e) { console.error(e); } };
</script>
</body>
</html>
